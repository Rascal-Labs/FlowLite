<script type="text/plain" id="flowlite-relation-spec">
FlowLite 記法仕様 v1.1 draft

FlowLite は、対象・関係・レイヤーを平文で記述し、構造図として表示・編集するための記法です。

基本原則:
1. ノードは対象を表します。
2. エッジは対象同士の関係を表します。
3. タグは属性・状態・分類・表示レイヤーを表します。
4. タグは任意です。小さなフロー図ではタグなしでもかまいません。
5. 意味のある関係はエッジで表します。タグを関係の代わりにしないでください。
6. 色分けに使うタグは、同じ次元にそろえると読みやすくなります。時代・役割・国・分野のような異なる次元を同じ色レイヤーに混ぜすぎないでください。

1. ノード
- ノードは図の中の対象を表します。
- 対象は、人、概念、工程、データ、組織、ファイル、タスク、仮説、論文、特徴量、状態などです。

ノード構文:
A[通常ノード]
B{判断}
C((開始・終了))
D[(データ)]
N>注記]

ノードID:
- エッジでは表示ラベルではなくノードIDを使います。
- IDは主に英数字とアンダースコアを推奨します。

2. エッジ
- エッジはノード間の意味関係を表します。
- エッジ種別は単なる見た目ではなく、関係の種類を表します。
- 関係が曖昧な場合は、無理に強い種類を選ばず A -- B : label を使います。

推奨構文:
A -> B : ラベル

A -> B : 作用、流れ、因果、参照
- 定義: A が B へ動く、B を使う、B に作用する、B を参照する、B を呼ぶ。
- 例: User -> Browser : 操作する / API -> Database : 読み書きする / Hypothesis -> Experiment : 検証する
- 単なる同列の関連には使わないでください。

A => B : 所属、包含、分類、構成、継承
- 定義: A は B の要素、部分集合、型、部品、実装、継承先である。
- 例: Frontend => WebApp : 画面側 / Parser => CoreModule : 部品 / Zeus => Olympians : 主要神
- A と B が同一という意味ではありません。同一性には == を使います。

A == B : 同一、等価、別名、対応
- 定義: A と B は同じ対象、同じ概念、別名、または明確な一対一対応を持つ。
- 例: UserID == AccountID : 同じ識別子 / JPY == JapaneseYen : 別名
- 所属・分類・親子・部品関係には使わないでください。

A -- B : 関連、未分類、補助関係
- 定義: A と B は関係するが、方向・所属・同一・相互作用・ブロックに明確に分類しにくい。
- 例: Notice -- World : 注記 / ResearchTheme -- Paper : 関連
- 迷った場合はこのエッジを使い、ラベルで補足します。

A <-> B : 相互作用、双方向関係
- 定義: A と B が互いに作用する、同期する、交換する、フィードバックする。
- 例: Browser <-> Session : ログイン状態 / Theory <-> Observation : 相互に影響する
- 似ている、近い、関連するだけなら -- を使います。

A -x-> B : ブロック、禁止、制約、反証
- 定義: A が B の実行、到達、妥当性、採用、アクセスを明確に止める。
- 例: Validation -x-> BusinessLogic : 不正入力を止める / FailedResult -x-> Hypothesis : 仮説を反証する
- 強い関係です。弱い対比や比較には -- を使います。

3. タグ
- タグはノードに付くメタデータです。
- タグはノードではありません。
- タグはエッジではありません。
- タグは意味関係を直接表しません。
- タグは任意です。
- タグは、現在の図で対象をどの観点から見るかを示します。

タグ構文:
NodeID[表示ラベル] +Tag1 +Tag2 +Tag3

タグのルール:
- タグは + で始まります。
- 1ノードにつき最大3タグまで認識します。
- 4つ目以降のタグはエンジン上は無視されます。
- AI出力では1ノードに3タグを超えて付けないでください。
- 必要最小限のタグを使ってください。

タグに向くもの:
- 分類
- 状態
- 重要度
- 作業対象
- レビュー対象
- 表示グループ
- 担当
- レイヤー
- 種別
- ユースケース

エッジで表すべきもの:
- A が B を呼ぶ
- A が B に移動する
- A が B に属する
- A と B が同一である
- A が B を止める
- A と B が相互作用する

例:
API[API] +UsesDatabase

この関係を明示したい場合は、タグではなくエッジにします。

API -> Database : 読み書きする

例:
LiuBei[劉備] +Shu

これは分類メタデータとしては許容できます。Shu を図の対象として出したいなら、ノードとエッジで書きます。

Shu[蜀]
LiuBei => Shu : 所属

4. タグとスタイル
- タグには #styles で色を付けられます。
- #styles は、タグ色、ノード個別の色・形・サイズ・座標、エッジ色、キャンバス背景を扱えます。
- これにより、平文だけで図の見た目まで再現できます。
- 色はできるだけ #RRGGBB 形式を使ってください。

スタイル構文:
#styles
+Tag color:#RRGGBB
@NodeID color:#RRGGBB shape:star size:l x:100 y:200
@edge:EdgeID color:#RRGGBB
@canvas background:#RRGGBB

色の優先順位:
1. @NodeID の個別色
2. #styles のタグ色
3. デフォルト色

複数タグ:
- ノードに複数タグがある場合、FlowLite は左から順に #styles を探し、最初に見つかったタグ色を使います。
- 色を効かせたいタグは左側に置いてください。
- @NodeID の個別スタイルは、タグ色や基本形より優先されます。
- 対応 shape: round, rect, circle, ellipse, diamond, parallelogram, hexagon, trapezoid, document, star, heart, double
- 対応 size: m, l。省略時は標準サイズです。
- x と y は手動座標です。HTML/SVGを平文から再生成するために使えます。

例:
Alice((アリス)) +Hero
Queen[ハートの女王] +Royal

#styles
+Hero color:#fde68a
+Royal color:#fecaca
@Alice shape:star size:l color:#fde68a
@Queen shape:heart size:l color:#fbcfe8

5. 色分けの指針
- 色分けは便利ですが、無秩序に使うと意味のない装飾になります。
- 色を付ける前に、どのレイヤーを見せたいか決めてください。
- 同じ次元のタグだけを色に使うと読みやすくなります。
- 色を付けないタグは #styles に書かなくてもかまいません。

良い色レイヤー:
- 国別: +Wei / +Shu / +Wu
- 役割別: +Theory / +Experiment / +Synthesis / +Interpretation
- 状態別: +TODO / +Done / +Blocked

悪い色レイヤー:
- +Theory
- +19thCentury
- +Germany
- +QuantumTheory

役割、時代、国、分野をすべて同時に色対象にすると、色の意味が弱くなります。

6. 情報レイヤー
- 第1層: 対象。ノードで表します。
- 第2層: 関係。エッジで表します。
- 第3層: 属性・状態・分類。タグで表します。
- 第4層: 見た目。#styles またはGUI設定で表します。

原則:
- 意味関係はエッジに書く。
- 横断的な分類や状態はタグに書く。
- 見た目は #styles に書く。
- タグは任意。

7. レイアウトモード
direction: Horizontal / Vertical / Circle / Grid / Focus / Top / Flow / Compact / Lane / Cluster

初期値は Flow です。

  function safeId(s){return String(s||'').trim().replace(/\s+/g,'_').replace(/[\[\]\{\}\(\):]/g,'_')||'node'}
  function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
  function safeCssColor(color,fallback=''){const v=String(color||'').trim();return /^#[0-9a-fA-F]{6}$/.test(v)?v:fallback}
  function safeScriptText(s){return String(s??'').replace(/<\/script/gi,'<\\/script')}

  function setSourceScriptText(text){sourceEl.textContent='\n'+safeScriptText(String(text||'').trim())+'\n'}

  function jsonScriptText(value){return '\n'+safeScriptText(JSON.stringify(value,null,2))+'\n'}

  function splitLabelLines(text,maxChars=14){
    const out=[];

      let line=raw.trim();
      if(!line){out.push('');continue}
      while(line.length>maxChars){out.push(line.slice(0,maxChars));line=line.slice(maxChars)}
      out.push(line);
    }
    return out.length?out:[''];
  }
  function estimateTextWidth(lines){
    const maxLen=Math.max(...lines.map(x=>Array.from(x).reduce((n,ch)=>n+(/[\u3000-\u9fff\u3040-\u30ff]/.test(ch)?1.7:1),0)));

  }
  function nodePlainStyle(id){return (graph&&graph.meta&&graph.meta.nodeStyles&&graph.meta.nodeStyles[id])||{}}
  function nodeVisualMeta(id){return {...((manualMeta&&manualMeta[id])||{}), ...nodePlainStyle(id)}}
  function nodeSizeScaleById(id){
    const m=nodeVisualMeta(id);
    return m.size==='l'?1.50:(m.size==='m'?1.25:1);
  }
  function edgePadForNode(id, base){
    const scale=nodeSizeScaleById(id);
    return base + (scale-1)*44;
  }
  function graphNodeById(id){return (graph.nodes||[]).find(n=>n.id===id)||null}
  function currentNodeShape(id){
    const n=graphNodeById(id);
    const meta=nodeVisualMeta(id);
    let sh=(meta.shape||(n&&n.shape)||'process');
    if(sh==='wavy')sh='double';
    if(sh==='cloud')sh='parallelogram';
    return sh;
  }
  function nodeDomMetrics(id){
    const sh=currentNodeShape(id);
    const els=viewport?viewport.querySelectorAll('.node'):[];
    for(const el of els){
      if(el.dataset&&el.dataset.id===id){
        const r=el.getBoundingClientRect();
        const s=scale||1;
        const w=Math.max(20,r.width/s);
        const h=Math.max(20,r.height/s);
        return {w,h,shape:sh};
      }
    }
    return null;
  }
  function svgNodeMetrics(id){
    const n=graphNodeById(id);
    const sh=currentNodeShape(id);
    const lines=splitLabelLines(n?n.label:id,14);
    const lineH=16;
    const nodeW=estimateTextWidth(lines);
    const nodeH=Math.max(44,lines.length*lineH+22);
    const sizeScale=nodeSizeScaleById(id);
    let w=Math.round(nodeW*sizeScale), h=Math.round(nodeH*sizeScale);
    if(['trapezoid','star','heart'].includes(sh)){
      const minW = sh==='heart' ? (sizeScale>=1.5?168:(sizeScale>=1.25?132:102)) : (sizeScale>=1.5?165:(sizeScale>=1.25?128:100));
      const minH = sh==='heart' ? (sizeScale>=1.5?148:(sizeScale>=1.25?116:88)) : (sizeScale>=1.5?150:(sizeScale>=1.25?118:90));
      w=Math.max(w,minW);
      h=Math.max(h,minH);
    }
    if(sh==='circle'){
      const d=Math.max(w,h);
      w=d; h=d;

  }
  function boundaryDistanceForNode(metrics, ux, uy){
    const hx=Math.max(8,(metrics&&metrics.w||92)/2);
    const hy=Math.max(8,(metrics&&metrics.h||44)/2);
    const ax=Math.abs(ux), ay=Math.abs(uy);
    const sh=(metrics&&metrics.shape)||'process';
    if(sh==='circle')return Math.max(hx,hy);
    if(sh==='ellipse'||sh==='heart'){
      return 1/Math.sqrt((ux*ux)/(hx*hx)+(uy*uy)/(hy*hy));
    }
    if(sh==='diamond'){
      return 1/((ax/hx)+(ay/hy)||1);
    }
    if(sh==='star'){
      return 1/Math.sqrt((ux*ux)/(hx*hx)+(uy*uy)/(hy*hy));
    }
    return Math.min(ax>0?hx/ax:Infinity,ay>0?hy/ay:Infinity);

    if(k==='belongs')return 20;
    if(k==='block')return 19;
    return 18;

  function edgeEndpointPoints(e, mode){
    const a=graph.layout[e.from], b=graph.layout[e.to];
    if(!a||!b)return null;
    const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy)||1;
    const ux=dx/len, uy=dy/len;
    const fromM=nodeMetricsForEdge(e.from,mode);
    const toM=nodeMetricsForEdge(e.to,mode);
    let padA=boundaryDistanceForNode(fromM,ux,uy)+markerClearance(e.kind,'start');
    let padB=boundaryDistanceForNode(toM,ux,uy)+markerClearance(e.kind,'end');

    if(padA+padB>maxTotal&&padA+padB>0){
      const r=maxTotal/(padA+padB);
      padA*=r; padB*=r;
    }
    const x1=a.x+ux*padA, y1=a.y+uy*padA;
    const x2=b.x-ux*padB, y2=b.y-uy*padB;
    return {a,b,dx,dy,len,ux,uy,padA,padB,x1,y1,x2,y2};
  }

  function tagStyleColor(tags,styles){

  function collectTagStats(){

  function parseText(text,base){
    const baseGraph=base||graph||{};
    const nodes=new Map(), edges=[];
    const styles={}, nodeStyles={}, edgeStyles={}, canvasStyle={};
    const lines=normalizeSourceLines(text);
    let title=baseGraph.meta?.title||'FlowLite', direction=baseGraph.meta?.direction||'Flow';
    let section='';
    const edgeCount={};
    parseWarnings=[];
    function ensureAutoNode(id){
      if(!nodes.has(id))nodes.set(id,{id,label:id,shape:'process',tags:[],auto:true});
    }
    for(const item of lines){
      let line=String(item.text||'').trim();
      line=line.replace(/^#\s+(nodes|edges|styles)\s*$/i,'#$1');
      if(!line)continue;
      let sec=line.match(/^#(nodes|edges|styles)\s*$/i);
      if(sec){section=sec[1].toLowerCase();continue}
      if(line.startsWith('#'))continue;
      let m;
      if((m=line.match(/^title\s*:\s*([\s\S]*)$/i))){title=m[1].trim();continue}
      if((m=line.match(/^direction\s*:\s*([A-Za-z][A-Za-z\s_-]*)\s*$/i))){direction=layoutModeForText(m[1]);continue}

      if(section==='styles'){
        const st=parseStyleLine(line);
        if(st){
          if(st.kind==='tag')styles[st.tag]={color:st.color};
          else if(st.kind==='node')nodeStyles[st.id]={...(nodeStyles[st.id]||{}),...st.props};
          else if(st.kind==='edge')edgeStyles[st.target]={...(edgeStyles[st.target]||{}),...st.props};
          else if(st.kind==='canvas')Object.assign(canvasStyle,st.props);
          continue;
        }
        parseWarnings.push(`Line ${item.line}: invalid #styles syntax: ${line.slice(0,80)} / examples: +Theory color:#dbeafe, @Alice shape:star size:l color:#fde68a, @edge:e_A_B color:#ef4444, @canvas background:#f8fafc`);
        continue;
      }

      const nodeTail=parseNodeTail(line);
      const nodeLine=nodeTail.body;
      const tags=nodeTail.tags;
      if((m=nodeLine.match(/^([^\s\[\]\{\}\(\):]+)\[\(([\s\S]*?)\)\]$/))){nodes.set(m[1],{id:m[1],label:normalizeLabelText(m[2]),shape:'data',tags});continue}
      if((m=nodeLine.match(/^([^\s\[\]\{\}\(\):]+)\(\(([\s\S]*?)\)\)$/))){nodes.set(m[1],{id:m[1],label:normalizeLabelText(m[2]),shape:'terminal',tags});continue}
      if((m=nodeLine.match(/^([^\s\[\]\{\}\(\):]+)\{([\s\S]*?)\}$/))){nodes.set(m[1],{id:m[1],label:normalizeLabelText(m[2]),shape:'decision',tags});continue}
      if((m=nodeLine.match(/^([^\s\[\]\{\}\(\):]+)>([\s\S]*?)\]$/))){nodes.set(m[1],{id:m[1],label:normalizeLabelText(m[2]),shape:'note',tags});continue}
      if((m=nodeLine.match(/^([^\s\[\]\{\}\(\):]+)\[([\s\S]*?)\]$/))){nodes.set(m[1],{id:m[1],label:normalizeLabelText(m[2]),shape:'process',tags});continue}

      const edgeParsed=parseEdgeLine(line);
      if(edgeParsed){
        const from=safeId(edgeParsed.from), to=safeId(edgeParsed.to), label=normalizeLabelText(edgeParsed.label||''), kind=normalizeEdgeKind(edgeParsed.kind);
        ensureAutoNode(from);
        ensureAutoNode(to);
        const base=`e_${from}_${to}`;
        edgeCount[base]=(edgeCount[base]||0)+1;
        edges.push({id:edgeCount[base]>1?`${base}_${edgeCount[base]}`:base,from,to,label,kind});
        continue;
      }
      parseWarnings.push(`Line ${item.line}: invalid syntax: ${line.slice(0,80)}`);
    }
    const autoNodeIds=[...nodes.values()].filter(n=>n.auto).map(n=>n.id);
    if(autoNodeIds.length){
      const shown=autoNodeIds.slice(0,12).join(', ');
      const more=autoNodeIds.length>12?` plus ${autoNodeIds.length-12} more`:'';
      parseWarnings.push(`Auto-generated nodes: ${shown}${more} / IDs not defined in #nodes are used in #edges. Check malformed or missing node definitions.`);
    }
    const prevDirection=normalizeLayoutMode(baseGraph.meta?.direction||'Flow');
    const next={meta:{...(baseGraph.meta||{}),title,direction:normalizeLayoutMode(direction),styles,nodeStyles,edgeStyles,canvasStyle},nodes:[...nodes.values()],edges,layout:{...(baseGraph.layout||{})}};
    cleanupLayout(next);
    let hasPlainLayout=false;
    const nodeIds=new Set(next.nodes.map(n=>n.id));
    for(const [id,st] of Object.entries(nodeStyles||{})){
      if(nodeIds.has(id)&&Number.isFinite(Number(st.x))&&Number.isFinite(Number(st.y))){
        next.layout[id]={x:Number(st.x),y:Number(st.y)};
        hasPlainLayout=true;
      }
    }
    if(hasPlainLayout){ensureLayout(next);}
    else if(normalizeLayoutMode(direction)!==prevDirection || Object.keys(next.layout||{}).length===0){applyLayoutModeToGraph(next,direction);}else{ensureLayout(next);}
    return next;
  }

  function cleanupLayout(g){const ids=new Set(g.nodes.map(n=>n.id));for(const id of Object.keys(g.layout||{})){if(!ids.has(id))delete g.layout[id]}}
  function normalizeLayoutMode(mode){
    const k=String(mode||'Flow').trim().toLowerCase().replace(/[\s_-]+/g,'');
    const modes={
      horizontal:'Horizontal',vertical:'Vertical',circle:'Circle',grid:'Grid',
      focus:'Focus',top:'Top',flow:'Flow',
      compact:'Compact',compactflow:'Compact',flowcompact:'Compact',
      lane:'Lane',lanes:'Lane',
      cluster:'Cluster',tag:'Cluster',tags:'Cluster',tagcluster:'Cluster'
    };
    return modes[k] || 'Flow';
  }
  function layoutModeForText(mode){return normalizeLayoutMode(mode);}
  function updateEditorFromGraph(){editor.value=jsonToText(graph)}
  function degreeScoreForGraph(g){
    const score={}; (g.nodes||[]).forEach(n=>score[n.id]=0);
    (g.edges||[]).forEach(e=>{if(score[e.from]!==undefined)score[e.from]++; if(score[e.to]!==undefined)score[e.to]++;});
    return score;
  }
  function firstTagOfNode(n){return (Array.isArray(n.tags)&&n.tags[0])?String(n.tags[0]):'その他'}
  function tagGroupsForGraph(g){
    const groups={};
    for(const n of (g.nodes||[])){
      const tag=firstTagOfNode(n);
      if(!groups[tag])groups[tag]=[];
      groups[tag].push(n);
    }
    return groups;
  }
  function tagGroupOrder(g){
    const groups=tagGroupsForGraph(g);
    const deg=degreeScoreForGraph(g);
    return Object.keys(groups).sort((a,b)=>{
      const da=groups[a].reduce((s,n)=>s+(deg[n.id]||0),0);
      const db=groups[b].reduce((s,n)=>s+(deg[n.id]||0),0);
      return db-da || groups[b].length-groups[a].length || a.localeCompare(b);
    });
  }
  function directedDepthRank(g){
    const ids=new Set((g.nodes||[]).map(n=>n.id));
    const directed=(g.edges||[]).filter(e=>normalizeEdgeKind(e.kind)==='directed'&&ids.has(e.from)&&ids.has(e.to));
    const incoming={}, outgoing={}, rank={};
    ids.forEach(id=>{incoming[id]=0;outgoing[id]=[];rank[id]=0});
    directed.forEach(e=>{incoming[e.to]++;outgoing[e.from].push(e.to)});
    const q=[...ids].filter(id=>incoming[id]===0).sort();
    const seen=new Set(q);
    while(q.length){
      const id=q.shift();
      for(const to of outgoing[id]||[]){
        rank[to]=Math.max(rank[to]||0,(rank[id]||0)+1);
        incoming[to]--;
        if(incoming[to]===0&&!seen.has(to)){seen.add(to);q.push(to);q.sort()}
      }
    }
    return rank;
  }
  function tagStyleFill(tag){
    const styles=(graph&&graph.meta&&graph.meta.styles)||{};
    const color=styles[tag]&&styles[tag].color?safeCssColor(styles[tag].color,'#e2e8f0'):'#e2e8f0';
    return color;
  }
  function hexToRgba(hex,a){
    const m=String(hex||'').match(/^#([0-9a-fA-F]{6})$/);
    if(!m)return `rgba(226,232,240,${a})`;
    const n=parseInt(m[1],16);
    const r=(n>>16)&255,g=(n>>8)&255,b=n&255;
    return `rgba(${r},${g},${b},${a})`;
  }
  function applyLaneLayoutToGraph(g){
    const groups=tagGroupsForGraph(g);
    const order=tagGroupOrder(g);
    const deg=degreeScoreForGraph(g);
    const rank=directedDepthRank(g);
    g.layout={};
    const startX=150,startY=130,gapX=215,gapY=165;
    order.forEach((tag,li)=>{
      const nodes=[...groups[tag]].sort((a,b)=>{
        const dr=(rank[a.id]||0)-(rank[b.id]||0);
        if(dr!==0)return dr;
        const dd=(deg[b.id]||0)-(deg[a.id]||0);
        return dd!==0?dd:String(a.id).localeCompare(String(b.id));
      });
      nodes.forEach((n,i)=>{g.layout[n.id]={x:startX+i*gapX,y:startY+li*gapY}});
    });
  }
  function applyClusterLayoutToGraph(g){
    const groups=tagGroupsForGraph(g);
    const order=tagGroupOrder(g);
    const deg=degreeScoreForGraph(g);
    g.layout={};
    const cols=Math.ceil(Math.sqrt(order.length||1));
    const cellW=520,cellH=390,startX=310,startY=250;
    order.forEach((tag,gi)=>{
      const cx=startX+(gi%cols)*cellW;
      const cy=startY+Math.floor(gi/cols)*cellH;
      const nodes=[...groups[tag]].sort((a,b)=>(deg[b.id]||0)-(deg[a.id]||0)||String(a.id).localeCompare(String(b.id)));
      if(!nodes.length)return;
      g.layout[nodes[0].id]={x:cx,y:cy};
      const rest=nodes.slice(1);
      const rings=[];
      rest.forEach((n,i)=>{
        const ring=Math.floor(i/8);
        if(!rings[ring])rings[ring]=[];
        rings[ring].push(n);
      });
      rings.forEach((ringNodes,ri)=>{
        const radius=125+ri*95;
        ringNodes.forEach((n,j)=>{
          const a=(-Math.PI/2)+(Math.PI*2*j/ringNodes.length)+(ri%2?0:Math.PI/(ringNodes.length||1));
          g.layout[n.id]={x:Math.round(cx+Math.cos(a)*radius),y:Math.round(cy+Math.sin(a)*radius)};
        });
      });
    });
  }
  function applyCompactLayoutToGraph(g){
    const nodeIds=g.nodes.map(n=>n.id);
    const nodeMap={}; g.nodes.forEach(n=>nodeMap[n.id]=n);
    const directed=(g.edges||[]).filter(e=>normalizeEdgeKind(e.kind)==='directed'&&nodeMap[e.from]&&nodeMap[e.to]);
    const outgoing={}, incoming={}, degree={};
    nodeIds.forEach(id=>{outgoing[id]=[];incoming[id]=[];degree[id]=0});
    directed.forEach(e=>{outgoing[e.from].push(e);incoming[e.to].push(e)});
    (g.edges||[]).forEach(e=>{if(degree[e.from]!==undefined)degree[e.from]++; if(degree[e.to]!==undefined)degree[e.to]++;});
    function depth(id,seen=new Set()){
      if(seen.has(id))return 0;seen.add(id);
      let best=0;for(const e of outgoing[id]||[]){best=Math.max(best,1+depth(e.to,new Set(seen)))}
      return best;
    }
    const roots=nodeIds.filter(id=>(incoming[id]||[]).length===0);
    let cur=(roots.sort((a,b)=>(depth(b)-depth(a))||(degree[b]-degree[a])||a.localeCompare(b))[0])||nodeIds[0];
    const main=[],seen=new Set();
    while(cur&&!seen.has(cur)){
      main.push(cur);seen.add(cur);
      const cand=(outgoing[cur]||[]).filter(e=>!seen.has(e.to));
      if(!cand.length)break;
      cand.sort((a,b)=>depth(b.to,new Set(seen))-depth(a.to,new Set(seen))||(degree[b.to]||0)-(degree[a.to]||0)||a.to.localeCompare(b.to));
      cur=cand[0].to;
    }
    g.layout={};
    const placed=new Set();
    const centerX=560,startY=140,gapY=140,sideX=285,nearX=210;
    function place(id,x,y){if(placed.has(id))return;g.layout[id]={x:Math.round(x),y:Math.round(y)};placed.add(id)}
    main.forEach((id,i)=>place(id,centerX,startY+i*gapY));
    const sideCount={};
    function sideSlot(baseId,preferred){
      sideCount[baseId]=sideCount[baseId]||{l:0,r:0};
      const base=g.layout[baseId]||{x:centerX,y:startY};
      const side=preferred==='left'?'l':(preferred==='right'?'r':(sideCount[baseId].r<=sideCount[baseId].l?'r':'l'));
      const idx=sideCount[baseId][side]++;
      const dir=side==='r'?1:-1;
      return {x:base.x+dir*(sideX+(idx%2)*nearX),y:base.y+(Math.floor(idx/2)-0.5)*72};
    }
    for(const id of main){
      const branches=(outgoing[id]||[]).filter(e=>!placed.has(e.to));
      branches.forEach((e,j)=>{
        const p=sideSlot(id,j%2===0?'right':'left');
        place(e.to,p.x,p.y);
      });
    }
    for(const e of g.edges||[]){
      const k=normalizeEdgeKind(e.kind);
      const a=placed.has(e.from),b=placed.has(e.to);
      const baseId=a?e.from:(b?e.to:null);
      if(!baseId)continue;
      const other=a?e.to:e.from;
      if(placed.has(other))continue;
      const preferred=k==='block'?'left':(k==='belongs'||k==='association'||k==='identity'?'right':null);
      const p=sideSlot(baseId,preferred);
      place(other,p.x,p.y);
    }
    let rest=0;
    for(const id of nodeIds){
      if(placed.has(id))continue;
      place(id,centerX+(rest%4-1.5)*210,startY+(main.length+1)*gapY+Math.floor(rest/4)*120);
      rest++;
    }
  }

  function applyLayoutModeToGraph(g,mode){
    if(!g||!Array.isArray(g.nodes)||!g.nodes.length)return;
    const m=normalizeLayoutMode(mode);
    const count=g.nodes.length;
    const gapX=190,gapY=115,startX=120,startY=120;
    g.layout={};
    if(m==='Horizontal'){
      g.nodes.forEach((n,i)=>{g.layout[n.id]={x:startX+i*gapX,y:startY}});
    }else if(m==='Vertical'){
      g.nodes.forEach((n,i)=>{g.layout[n.id]={x:startX,y:startY+i*gapY}});
    }else if(m==='Circle'){
      const radius=Math.max(180,Math.ceil(count*34));
      const cx=radius+180, cy=radius+150;
      g.nodes.forEach((n,i)=>{const a=(-Math.PI/2)+(Math.PI*2*i/count);g.layout[n.id]={x:Math.round(cx+Math.cos(a)*radius),y:Math.round(cy+Math.sin(a)*radius)}});
    }else if(m==='Grid'){
      const cols=Math.ceil(Math.sqrt(count));
      g.nodes.forEach((n,i)=>{g.layout[n.id]={x:startX+(i%cols)*gapX,y:startY+Math.floor(i/cols)*gapY}});
    }else if(m==='Focus'){
      const score=degreeScoreForGraph(g);
      const sorted=[...g.nodes].sort((a,b)=>{const d=(score[b.id]||0)-(score[a.id]||0);return d!==0?d:String(a.id).localeCompare(String(b.id));});
      const cx=520, cy=420;
      if(sorted[0])g.layout[sorted[0].id]={x:cx,y:cy};
      let idx=1, ring=1;
      while(idx<sorted.length){
        const capacity=Math.min(sorted.length-idx,6+ring*6);
        const radius=150+ring*130;
        for(let j=0;j<capacity;j++){
          const a=(-Math.PI/2)+(Math.PI*2*j/capacity)+(ring%2?0:Math.PI/capacity);
          const n=sorted[idx++];
          g.layout[n.id]={x:Math.round(cx+Math.cos(a)*radius),y:Math.round(cy+Math.sin(a)*radius)};
        }
        ring++;
      }
    }else if(m==='Top'){
      const score=degreeScoreForGraph(g);
      const sorted=[...g.nodes].sort((a,b)=>{const d=(score[b.id]||0)-(score[a.id]||0);return d!==0?d:String(a.id).localeCompare(String(b.id));});
      const cx=520, gapY2=135, gapX2=210;
      let idx=0,row=0;
      while(idx<sorted.length){
        const capacity=Math.min(sorted.length-idx,row===0?1:Math.min(8,row+2));
        const rowWidth=(capacity-1)*gapX2;
        for(let j=0;j<capacity;j++){
          const n=sorted[idx++];
          g.layout[n.id]={x:Math.round(cx-rowWidth/2+j*gapX2),y:110+row*gapY2};
        }
        row++;
      }
    }else if(m==='Flow'){
      applyFlowLayoutToGraph(g);
    }else if(m==='Compact'){
      applyCompactLayoutToGraph(g);
    }else if(m==='Lane'){

      return d!==0?d:a.id.localeCompare(b.id);
    });
    const cx=520, cy=420;
    const first=sorted[0];
    if(first)graph.layout[first.id]={x:cx,y:cy};
    let idx=1, ring=1;
    while(idx<sorted.length){
      const capacity=Math.min(sorted.length-idx, 6+ring*6);
      const radius=150+ring*130;
      for(let j=0;j<capacity;j++){
        const a=(-Math.PI/2)+(Math.PI*2*j/capacity)+(ring%2?0:Math.PI/capacity);
        const n=sorted[idx++];
        graph.layout[n.id]={x:Math.round(cx+Math.cos(a)*radius),y:Math.round(cy+Math.sin(a)*radius)};
      }
      ring++;
    }
    editor.value=jsonToText(graph);
    render();
    fitToContent();
    setStatus(message||'順位配置を適用しました');
  }

  function currentRankScoreForLayout(){
    if(analysisMode==='selected') return Object.keys(analysisScores||{}).length ? analysisScores : (getSingleSelectedNodeId() ? computeLocalScores(getSingleSelectedNodeId()) : computeDegreeScores());
    if(analysisMode==='bridge') return computeBridgeScores();
    if(analysisMode==='closeness') return computeClosenessScores();
    if(analysisMode==='community') return computeCommunityScores(Object.keys(communityLabels||{}).length?communityLabels:computeCommunityLabels());
    if(analysisMode==='degree') return computeDegreeScores();
    return computeDegreeScores();
  }

  function applyRankedTopByScores(score, message){
    if(!graph.nodes.length){setStatus('配置するノードがありません');return}
    pushHistory();
    const sorted=[...graph.nodes].sort((a,b)=>{
      const d=(score[b.id]||0)-(score[a.id]||0);
      return d!==0?d:a.id.localeCompare(b.id);
    });
    const cx=520, startY=110, gapY=135, gapX=210;
    let idx=0, row=0;
    while(idx<sorted.length){
      const capacity=Math.min(sorted.length-idx, row===0?1:Math.min(8, row+2));
      const rowWidth=(capacity-1)*gapX;
      for(let j=0;j<capacity;j++){
        const n=sorted[idx++];
        graph.layout[n.id]={x:Math.round(cx-rowWidth/2+j*gapX), y:startY+row*gapY};
      }
      row++;
    }
    editor.value=jsonToText(graph);
    render();
    fitToContent();
    setStatus(message||'上位ノードを上側に配置しました');
  }

        message=getSingleSelectedNodeId() ? `中心配置を適用しました: ${getSingleSelectedNodeId()} を最上位として選択中心順に配置しました` : '中心配置を適用しました: 現在の選択中心表示を保持しました';

      else if(analysisMode==='closeness'){score=computeClosenessScores();message='Focus layout applied: arranged by high Closeness Rank';}
      else if(analysisMode==='community'){communityLabels=Object.keys(communityLabels||{}).length?communityLabels:computeCommunityLabels();score=computeCommunityScores(communityLabels);message='Focus layout applied: arranged by community size';}
      else {score=computeDegreeScores();message='Focus layout applied: arranged by high Degree Rank';}
      suppressHistory=true;
      applyRankedRadialByScores(score,message);
      suppressHistory=false;
      graph.meta.direction='Focus';
      updateEditorFromGraph();
      return;
    }

    if(mode==='Top' && analysisMode){
      let score=currentRankScoreForLayout();
      let message='Top layout applied: nodes with more connections placed higher';
      if(analysisMode==='selected' && getSingleSelectedNodeId()) message=`上寄せ配置を適用しました: ${getSingleSelectedNodeId()} を最上位として上から下へ配置しました`;
      else if(analysisMode==='bridge') message='Top layout applied: arranged top-down by high Bridge Rank';
      else if(analysisMode==='closeness') message='Top layout applied: arranged top-down by high Closeness Rank';
      else if(analysisMode==='community') message='Top layout applied: arranged top-down by community size';
      else if(analysisMode==='degree') message='Top layout applied: arranged top-down by high Degree Rank';
      suppressHistory=true;
      applyRankedTopByScores(score,message);
      suppressHistory=false;
      graph.meta.direction='Top';
      updateEditorFromGraph();
      return;
    }

    applyLayoutModeToGraph(graph,mode);
    updateEditorFromGraph();
    render();
    fitToContent();
    setStatus(`${mode} 配置を適用しました`);
  }

    if(shape==='parallelogram'||shape==='cloud')return `${x+w*0.16},${y} ${x+w},${y} ${x+w*0.84},${y+h} ${x},${y+h}`;

    if(shape==='trapezoid')return `${x+w/2},${y+h} ${x},${y} ${x+w},${y}`;
    if(shape==='document')return `${x},${y} ${x+w*0.78},${y} ${x+w},${y+h*0.22} ${x+w},${y+h} ${x},${y+h}`;
    if(shape==='star'){
      const pts=[]; const cx=x+w/2, cy=y+h/2, outer=Math.min(w,h)*0.5, inner=outer*0.45;
      for(let i=0;i<10;i++){
        const ang=-Math.PI/2 + i*Math.PI/5;
        const r=i%2===0?outer:inner;
        pts.push(`${cx+Math.cos(ang)*r},${cy+Math.sin(ang)*r}`);
      }
      return pts.join(' ');
    }
    return '';
  }
  function heartPathForShape(x,y,w,h){
    return `M ${x+w*0.5} ${y+h*0.92} C ${x+w*0.16} ${y+h*0.72}, ${x+w*0.02} ${y+h*0.46}, ${x+w*0.20} ${y+h*0.24} C ${x+w*0.33} ${y+h*0.07}, ${x+w*0.47} ${y+h*0.16}, ${x+w*0.5} ${y+h*0.30} C ${x+w*0.53} ${y+h*0.16}, ${x+w*0.67} ${y+h*0.07}, ${x+w*0.80} ${y+h*0.24} C ${x+w*0.98} ${y+h*0.46}, ${x+w*0.84} ${y+h*0.72}, ${x+w*0.5} ${y+h*0.92} Z`;
  }

  window.saveSvg=function(){
    drawEdges();
    const b=contentBounds();
    const pad=90;
    const minX=b.minX-pad,minY=b.minY-pad,w=b.maxX-b.minX+pad*2,h=b.maxY-b.minY+pad*2;
    let markerDefs='';
    const markerSet=new Set();
    function svgMarkerSafeColor(color){return String(color||'#94a3b8').replace(/[^a-zA-Z0-9_-]/g,'_')}
    function svgMarkerUrl(color,type){
      const c=safeCssColor(color,'#94a3b8');
      const t=type||'arrow';
      const id='svg_'+t+'_'+svgMarkerSafeColor(c);
      if(!markerSet.has(id)){
        markerSet.add(id);
        if(t==='block'){
          markerDefs+=`<marker id="${id}" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto"><path d="M 1 1 L 11 11 M 11 1 L 1 11" stroke="${c}" stroke-width="2" fill="none"/></marker>`;
        }else if(t==='hollow'){
          markerDefs+=`<marker id="${id}" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse"><path d="M 1.5 1.5 L 10.5 6 L 1.5 10.5 Z" stroke="${c}" stroke-width="1.8" fill="#fff"/></marker>`;
        }else{
          markerDefs+=`<marker id="${id}" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="${c}"/></marker>`;
        }
      }
      return `url(#${id})`;
    }
    function svgEdgeMarkers(kind,stroke){
      const k=normalizeEdgeKind(kind);
      if(k==='association'||k==='identity')return {start:'',end:''};
      if(k==='mutual')return {start:svgMarkerUrl(stroke,'arrow'),end:svgMarkerUrl(stroke,'arrow')};
      if(k==='block')return {start:'',end:svgMarkerUrl(stroke,'arrow')};
      if(k==='belongs')return {start:'',end:svgMarkerUrl(stroke,'hollow')};
      return {start:'',end:svgMarkerUrl(stroke,'arrow')};
    }
    let edgeSvg='';
    let nodeSvg='';
    for(const e of graph.edges){
      const a=graph.layout[e.from],bb=graph.layout[e.to];if(!a||!bb)continue;
      const ep=edgeEndpointPoints(e,'svg');
      if(!ep)continue;
      const {dx,dy,len,x1,y1,x2,y2}=ep;
      const style=edgeSvgAttrs(e,false,false);
      style.stroke=safeCssColor(style.stroke,edgeStrokeBase(style.k));
      const markers=svgEdgeMarkers(e.kind,style.stroke);
      const dash=style.dash?` stroke-dasharray="${style.dash}"`:'';
      const markerStart=markers.start?` marker-start="${markers.start}"`:'';
      const markerEnd=markers.end?` marker-end="${markers.end}"`:'';
      if(style.doubleLine){
        const ox=-dy/len*4, oy=dx/len*4;
        edgeSvg+=`<path d="M ${x1+ox} ${y1+oy} L ${x2+ox} ${y2+oy}" stroke="${style.stroke}" stroke-width="${style.width}" fill="none"${dash}/>`;
        edgeSvg+=`<path d="M ${x1-ox} ${y1-oy} L ${x2-ox} ${y2-oy}" stroke="${style.stroke}" stroke-width="${style.width}" fill="none"${dash}/>`;
      }else{
        edgeSvg+=`<path d="M ${x1} ${y1} L ${x2} ${y2}" stroke="${style.stroke}" stroke-width="${style.width}" fill="none"${dash}${markerStart}${markerEnd}/>`;
      }
      if(style.k==='block'){
        const bx=x2-dx/len*46, by=y2-dy/len*46;
        const ux=dx/len, uy=dy/len, px=-uy, py=ux, s=7;
        edgeSvg+=`<path d="M ${bx+(ux+px)*s} ${by+(uy+py)*s} L ${bx-(ux+px)*s} ${by-(uy+py)*s}" stroke="${style.stroke}" stroke-width="2.4" stroke-linecap="round" fill="none"/>`;
        edgeSvg+=`<path d="M ${bx+(ux-px)*s} ${by+(uy-py)*s} L ${bx-(ux-px)*s} ${by-(uy-py)*s}" stroke="${style.stroke}" stroke-width="2.4" stroke-linecap="round" fill="none"/>`;
      }
      if(e.label){
        const lines=splitLabelLines(e.label,18);
        const lineH=14;
        const startY=(y1+y2)/2-8-((lines.length-1)*lineH/2);
        edgeSvg+=`<text x="${(x1+x2)/2}" y="${startY}" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#475569" stroke="#f8fafc" stroke-width="4" paint-order="stroke">`;
        lines.forEach((line,i)=>{edgeSvg+=`<tspan x="${(x1+x2)/2}" dy="${i===0?0:lineH}">${escapeHtml(line)}</tspan>`});
        edgeSvg+='</text>';
      }
    }
    for(const n of graph.nodes){
      const p=graph.layout[n.id];if(!p)continue;
      const box=svgNodeMetrics(n.id);
      const lines=box.lines||splitLabelLines(n.label,14);
      const lineH=box.lineH||16;
      let nodeW2=box.w, nodeH2=box.h;
      const x=p.x-nodeW2/2,y=p.y-nodeH2/2;
      const fill=safeCssColor(nodeEffectiveColor(n),'#ffffff');
      const sh=box.shape||'process';
      if(sh==='circle'){
        const r=Math.max(nodeW2,nodeH2)/2; nodeSvg+=`<ellipse cx="${p.x}" cy="${p.y}" rx="${r}" ry="${r}" fill="${fill}" stroke="#0f172a" stroke-width="1.5"/>`;
      }else if(sh==='ellipse'){
        nodeSvg+=`<ellipse cx="${p.x}" cy="${p.y}" rx="${nodeW2/2}" ry="${nodeH2/2}" fill="${fill}" stroke="#0f172a" stroke-width="1.5"/>`;
      }else if(sh==='diamond'){
        nodeSvg+=`<polygon points="${p.x},${y} ${x+nodeW2},${p.y} ${p.x},${y+nodeH2} ${x},${p.y}" fill="${fill}" stroke="#0f172a" stroke-width="1.5"/>`;
      }else if(['parallelogram','hexagon','trapezoid','cloud','document','star'].includes(sh)){
        const pts=polygonPointsForShape(sh,x,y,nodeW2,nodeH2);
        nodeSvg+=`<polygon points="${pts}" fill="${fill}" stroke="#0f172a" stroke-width="1.8"/>`;
        if(sh==='document')nodeSvg+=`<path d="M ${x+nodeW2*0.78} ${y} L ${x+nodeW2*0.78} ${y+nodeH2*0.22} L ${x+nodeW2} ${y+nodeH2*0.22}" fill="none" stroke="#0f172a" stroke-width="1.2"/>`;
      }else if(sh==='heart'){
        nodeSvg+=`<path d="${heartPathForShape(x,y,nodeW2,nodeH2)}" fill="${fill}" stroke="#0f172a" stroke-width="1.8"/>`;
      }else if(sh==='double'||sh==='wavy'){
        nodeSvg+=`<rect x="${x}" y="${y}" width="${nodeW2}" height="${nodeH2}" rx="12" fill="${fill}" stroke="#0f172a" stroke-width="1.5"/>`;
        nodeSvg+=`<rect x="${x+5}" y="${y+5}" width="${Math.max(10,nodeW2-10)}" height="${Math.max(10,nodeH2-10)}" rx="9" fill="none" stroke="#0f172a" stroke-width="1.2"/>`;
      }else{
        const rx=sh==='rect'?2:12; nodeSvg+=`<rect x="${x}" y="${y}" width="${nodeW2}" height="${nodeH2}" rx="${rx}" fill="${fill}" stroke="#0f172a" stroke-width="1.5"/>`;
      }
      const startY=p.y-((lines.length-1)*lineH/2)+4;
      nodeSvg+=`<text x="${p.x}" y="${startY}" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#0f172a">`;
      lines.forEach((line,i)=>{nodeSvg+=`<tspan x="${p.x}" dy="${i===0?0:lineH}">${escapeHtml(line)}</tspan>`});
      nodeSvg+='</text>';
    }
    const bg=getCanvasBackground();
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="${minX} ${minY} ${w} ${h}"><defs>${markerDefs}</defs><rect x="${minX}" y="${minY}" width="${w}" height="${h}" fill="${bg}"/>${edgeSvg}${nodeSvg}</svg>`;
    download(`${safeFileName(graph.meta&&graph.meta.title)}_${Date.now()}.svg`,svg,'image/svg+xml;charset=utf-8')
  };
  window.copySpecText=async function(){

    const promptText=[

      '- 時代、役割、国、分野を1つの色レイヤーに混ぜると、意味のない装飾になりやすい。',
      '- #styles は見せたいレイヤーに絞る。',
      '- 2番目、3番目のタグは補助メタデータとして使える。必ず色を付ける必要はない。',
      '- 意味関係にはノードとエッジを使い、分類だけで足りる場合はタグを使う。',

      '',

  };
  function download(name,content,type){const blob=new Blob([content],{type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}

  refreshDataSlots(); editor.value=getSourceScriptText()||jsonToText(graph); graph=parseText(editor.value,{meta:graph.meta,layout:graph.layout}); render(); setTimeout(()=>fitToContent(),30);

})();
